[build]
  command = "npm install && node build-images.js"
  publish = "."

[build.environment]
  NODE_VERSION = "20"
  BUILD_TIMEOUT_MIN = "24"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/image-manifest-cdn.json"
  [headers.values]
    Cache-Control = "public, max-age=900"
